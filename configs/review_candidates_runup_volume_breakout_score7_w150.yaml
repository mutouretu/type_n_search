project_root: .
asof_date: "2026-03-27"
output_path: outputs/predictions/review/runup_score7_w150_2026-03-27/review_candidates_runup_volume_breakout_top500.csv
output_top_n: 0
primary_score_col: adjusted_score

baseline:
  name: baseline_type_n
  path: outputs/predictions/runup_score7_w150_2026-03-27/scan_predictions_intersection_top500_baseline_no_runupscore7_w150_strict_2026-03-27.csv
  score_col: score_mean
  top_n: 500

specialists: []

post_penalties:
  runup:
    enabled: true
    raw_data_dir: ../shared_data/raw/daily/parquet_daily_cache
    window: 150
    threshold: 0.4
    sharpness: 20
    weight: 0.8
    score_col: baseline_score
    output_score_col: adjusted_score

  volume:
    enabled: true
    raw_data_dir: ../shared_data/raw/daily/parquet_daily_cache
    ma_window: 20
    short_window: 3
    weight: 0.6
    score_col: adjusted_score
    output_score_col: adjusted_score
    keep_component_factors: false
    strength:
      threshold: 1.8
      sharpness: 3
      max_boost: 0.15
    streak:
      spike_ratio: 1.8
      threshold: 3
      sharpness: 1.5

  box_breakout:
    enabled: true
    raw_data_dir: ../shared_data/raw/daily/parquet_daily_cache
    window: 60
    high_col: high
    close_col: close
    weight: 1.0
    score_col: adjusted_score
    output_score_col: adjusted_score
    min_factor: 0.3
    max_factor: 1.2
    strength:
      threshold: -0.01
      sharpness: 80
