project_root: .
sample_meta_path: data/processed/sample_meta.parquet
x_tabular_path: data/processed/X_tabular.parquet
y_path: data/processed/y.npy
output_dir: outputs/models/baseline_lgbm

model_name: lightgbm
model_params:
  n_estimators: 200
  learning_rate: 0.05
  num_leaves: 31
  max_depth: 5
  min_child_samples: 10
  subsample: 0.8
  colsample_bytree: 0.8
  random_state: 42
  class_weight: balanced

threshold: 0.5
