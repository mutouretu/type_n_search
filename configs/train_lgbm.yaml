project_root: .
data_config_path: configs/data.yaml
sample_meta_path: data/processed/data_list_v4/sample_meta.parquet
x_tabular_path: data/processed/data_list_v4/X_tabular.parquet
y_path: data/processed/data_list_v4/y.npy
output_dir: outputs/models/baseline_lgbm_v4

model_name: lightgbm
model_params:
  n_estimators: 200
  learning_rate: 0.05
  num_leaves: 31
  max_depth: 5
  min_child_samples: 10
  subsample: 0.8
  colsample_bytree: 0.8
  random_state: 42
  class_weight: balanced

threshold: 0.5
