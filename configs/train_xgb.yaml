project_root: .
sample_meta_path: data/processed/sample_meta.parquet
x_tabular_path: data/processed/X_tabular.parquet
y_path: data/processed/y.npy
output_dir: outputs/models/baseline_xgb

model_name: xgboost
model_params:
  n_estimators: 200
  learning_rate: 0.05
  max_depth: 4
  min_child_weight: 5
  subsample: 0.8
  colsample_bytree: 0.8
  random_state: 42
  eval_metric: logloss
  use_label_encoder: false

threshold: 0.5
